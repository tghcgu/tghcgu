<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シナリオ詳細 — マーダーミステリー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
    header { background: #16213e; padding: 20px 32px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #5865f2; }
    header a { color: #aaa; text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: #fff; }
    header h1 { font-size: 1.3rem; color: #fff; }
    main { max-width: 800px; margin: 40px auto; padding: 0 20px 80px; }
    .badge { display: inline-block; background: #5865f2; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-bottom: 12px; }
    h2 { font-size: 1.8rem; color: #fff; margin-bottom: 10px; }
    .meta { color: #666; font-size: 0.8rem; margin-bottom: 24px; }
    section { background: #16213e; border: 1px solid #2d2d5e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    section h3 { font-size: 1rem; color: #5865f2; margin-bottom: 12px; }
    section p { line-height: 1.7; color: #ccc; white-space: pre-wrap; }
    .char-list, .clue-list, .phase-list { display: grid; gap: 12px; }
    .item { background: #0f0f23; border-radius: 8px; padding: 14px; }
    .item-name { font-weight: 700; color: #fff; font-size: 1rem; margin-bottom: 6px; }
    .item-desc { color: #aaa; font-size: 0.9rem; line-height: 1.5; }
    .killer-tag { color: #ed4245; font-size: 0.75rem; font-weight: 700; margin-left: 8px; }
    .clue-name { font-weight: 600; color: #ffe066; margin-bottom: 4px; font-size: 0.9rem; }

    /* フェーズ */
    .phase-item { background: #0f0f23; border-radius: 8px; padding: 14px; display: flex; gap: 14px; align-items: flex-start; }
    .phase-num { min-width: 32px; height: 32px; border-radius: 50%; background: #2d2d5e; color: #aaa; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .phase-body { flex: 1; }
    .phase-name { font-weight: 700; color: #fff; margin-bottom: 4px; }
    .phase-desc { color: #aaa; font-size: 0.85rem; line-height: 1.5; margin-bottom: 6px; }
    .phase-cond { font-size: 0.78rem; padding: 4px 10px; border-radius: 12px; display: inline-block; font-weight: 600; }
    .cond-manual             { background: #5865f2; color: #fff; }
    .cond-clues_investigated { background: #57f287; color: #000; }
    .cond-all_players_ready  { background: #fee75c; color: #000; }
    .cond-vote               { background: #ed4245; color: #fff; }

    .spoiler { filter: blur(5px); cursor: pointer; transition: filter 0.3s; user-select: none; }
    .spoiler:hover, .spoiler.revealed { filter: none; }
    .spoiler-hint { font-size: 0.75rem; color: #666; margin-top: 6px; }
    .discord-box { background: #0f0f23; border: 1px solid #5865f2; border-radius: 10px; padding: 16px; margin-top: 8px; }
    .discord-box code { color: #5865f2; font-size: 1rem; }
    #loading { text-align: center; color: #888; margin-top: 60px; }
  </style>
</head>
<body>
  <header>
    <a href="/scenarios">← 一覧に戻る</a>
    <h1 id="h-title">読み込み中…</h1>
  </header>
  <main id="loading">読み込み中...</main>
  <main id="content" style="display:none;">
    <div class="badge" id="s-id"></div>
    <h2 id="s-title"></h2>
    <p class="meta" id="s-meta"></p>

    <section>
      <h3>📖 事件概要</h3>
      <p id="s-overview"></p>
    </section>

    <section>
      <h3>👥 登場キャラクター</h3>
      <div class="char-list" id="s-chars"></div>
    </section>

    <section>
      <h3>🔍 手がかり一覧</h3>
      <div class="clue-list" id="s-clues"></div>
    </section>

    <section>
      <h3>🗺️ フェーズ構成</h3>
      <div class="phase-list" id="s-phases"></div>
    </section>

    <section>
      <h3>🔐 真相（クリックで表示）</h3>
      <p class="spoiler" id="s-answer" onclick="this.classList.add('revealed')"></p>
      <p class="spoiler-hint">クリックまたはタップで表示。ゲーム中は参加者に見せないでください。</p>
    </section>

    <section>
      <h3>🎮 Discordでゲームを始める</h3>
      <p style="color:#aaa; font-size:0.9rem; margin-bottom:12px;">このシナリオIDをDiscordで使ってゲームを開始できます。</p>
      <div class="discord-box"><code id="discord-cmd"></code></div>
    </section>
  </main>

  <script>
    const id = location.pathname.split('/').pop();

    const TYPE_LABELS = {
      manual:             'GM手動',
      clues_investigated: '手がかり調査',
      all_players_ready:  '全員準備完了',
      vote:               '投票',
    };

    function condText(p) {
      switch(p.type) {
        case 'clues_investigated': return `手がかり ${p.condition_value}個 調査後にGM進行`;
        case 'all_players_ready':  return '全員準備完了で自動進行';
        case 'vote': {
          const fail = p.on_fail_phase_index != null ? ` / 未達→フェーズ${p.on_fail_phase_index}に戻る` : '';
          return `投票 ${p.condition_value}% 以上で次へ${fail}`;
        }
        default: return 'GMが /game phase を実行して進む';
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function load() {
      const res = await fetch('/scenarios/api/' + id);
      if (!res.ok) { document.getElementById('loading').textContent = 'シナリオが見つかりません'; return; }
      const s = await res.json();

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('h-title').textContent = s.title;
      document.getElementById('s-id').textContent = 'シナリオID: ' + s.id;
      document.getElementById('s-title').textContent = s.title;
      document.getElementById('s-meta').textContent = `作成日: ${s.created_at}`;
      document.getElementById('s-overview').textContent = s.overview;
      document.getElementById('s-answer').textContent = s.answer;
      document.getElementById('discord-cmd').textContent = `/game start ${s.id}`;

      // キャラクター
      const chars = document.getElementById('s-chars');
      chars.innerHTML = s.characters.length === 0
        ? '<p style="color:#666">キャラクターなし</p>'
        : s.characters.map(c => `
          <div class="item">
            <div class="item-name">${esc(c.name)}${c.is_killer ? '<span class="killer-tag">🔪 犯人</span>' : ''}</div>
            <div class="item-desc">${esc(c.description)}</div>
          </div>`).join('');

      // 手がかり
      const clues = document.getElementById('s-clues');
      clues.innerHTML = s.clues.length === 0
        ? '<p style="color:#666">手がかりなし</p>'
        : s.clues.map(c => `
          <div class="item">
            <div class="clue-name">#${c.id} ${esc(c.name)}</div>
            <div class="item-desc">${esc(c.description)}</div>
          </div>`).join('');

      // フェーズ
      const phases = document.getElementById('s-phases');
      const isDefault = s.phases && s.phases[0]?.id < 0;
      phases.innerHTML = (isDefault ? '<p style="color:#888;font-size:0.8rem;margin-bottom:12px;">※ デフォルトフェーズを使用</p>' : '') +
        s.phases.map((p, i) => `
          <div class="phase-item">
            <div class="phase-num">${i + 1}</div>
            <div class="phase-body">
              <div class="phase-name">${esc(p.name)}</div>
              ${p.description ? `<div class="phase-desc">${esc(p.description)}</div>` : ''}
              <span class="phase-cond cond-${p.type}">${condText(p)}</span>
            </div>
          </div>`).join('');
    }

    load();
  </script>
</body>
</html>
